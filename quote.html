<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Quote - KP Gifting And KP Fashion</title>
    <meta name="description" content="Get a custom quote for your personalized apparel and gifting needs. Fast turnaround and premium quality in East Hartford.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=2">
    <style>
        .page-header {
            text-align: center;
            padding: 8rem 0 2rem;
        }
        .form-container {
            max-width: 700px;
            margin: 0 auto 6rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-control {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--color-text);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
            background: rgba(255, 255, 255, 0.1);
        }
        textarea.form-control {
            resize: vertical;
            min-height: 150px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="index.html">KP Fashion</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="quote.html" class="btn btn-primary">Get a Quote</a></li>
        </ul>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1 class="hero-title reveal">Request a <span class="gradient-text">Custom Quote</span></h1>
            <p class="reveal">Tell us what you're looking for, and we'll get back to you with pricing.</p>
        </div>
    </div>

    <section class="container form-container">
        <div style="text-align: center; margin-bottom: 2rem; color: var(--color-primary); font-weight: 600;">
            ⚡ Need it fast? Standard orders are ready within a day!
        </div>
        <div class="glass-card reveal">
            <!-- Replace YOUR_FORMSPREE_ID with your actual Formspree ID -->
            <form action="https://formspree.io/f/meewpqpr" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
                </div>
                <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div>
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control" required placeholder="john@example.com">
                    </div>
                    <div>
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="form-control" placeholder="(123) 456-7890">
                    </div>
                </div>
                <div class="form-group">
                    <label for="product">Product Interest</label>
                    <select id="product" name="product" class="form-control" required style="background-color: var(--color-bg);">
                        <option value="tshirt">Custom T-Shirts</option>
                        <option value="hoodie">Custom Hoodies</option>
                        <option value="gifts">Personalized Gifts</option>
                        <option value="other">Other/Mix</option>
                    </select>
                </div>
                <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div>
                        <label for="quantity">Estimated Quantity</label>
                        <input type="number" id="quantity" name="quantity" class="form-control" min="1" placeholder="e.g. 50">
                    </div>
                    <div>
                        <label for="size">Apparel Size</label>
                        <select id="size" name="size" class="form-control" style="background-color: var(--color-bg);">
                            <option value="">Select a size (Optional for bulk)</option>
                            <option value="S">Small (S)</option>
                            <option value="M">Medium (M)</option>
                            <option value="L">Large (L)</option>
                            <option value="XL">Extra Large (XL)</option>
                            <option value="XXL">Double Extra Large (XXL)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div>
                        <label for="color">Apparel Color</label>
                        <input type="text" id="color" name="color" class="form-control" placeholder="e.g. Black, White, Charcoal">
                    </div>
                    <div>
                        <label for="budget">Estimated Budget</label>
                        <input type="text" id="budget" name="budget" class="form-control" placeholder="e.g. $100 - $250">
                    </div>
                </div>
                <div class="form-group">
                    <label for="deadline">Target Deadline</label>
                    <input type="date" id="deadline" name="deadline" class="form-control">
                </div>
                <div class="form-group">
                    <label for="design_upload">Upload Design Photo / Logo</label>
                    <input type="file" id="design_upload" name="design_upload" class="form-control" accept="image/*" style="padding: 12px 1rem;">
                </div>
                <div class="form-group">
                    <label for="details">Design Details & Requirements</label>
                    <textarea id="details" name="details" class="form-control" required placeholder="Tell us about your design ideas, specific needs, or any questions..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">Submit Quote Request</button>
            </form>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div style="margin-bottom: 1.5rem; display: flex; justify-content: center; gap: 2rem;">
                <a href="https://instagram.com" target="_blank" style="font-weight: 600; color: var(--color-primary);">Instagram</a>
                <a href="https://facebook.com" target="_blank" style="font-weight: 600; color: var(--color-primary);">Facebook</a>
                <a href="https://tiktok.com" target="_blank" style="font-weight: 600; color: var(--color-primary);">TikTok</a>
            </div>
            <p>&copy; 2026 KP Gifting And KP Fashion. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
